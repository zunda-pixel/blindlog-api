name: Deploy

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 21 * * *"

# Serialize prod deploys but never cancel an in-flight one — overwriting an
# image mid-rollout produces unpredictable revisions.
concurrency:
  group: deploy-prod
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write   # Required for Workload Identity Federation

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_ID: ${{ vars.GOOGLE_CLOUD_PROJECT }}
      REGION: ${{ vars.GOOGLE_CLOUD_REGION }}
      SERVICE: ${{ vars.GOOGLE_CLOUD_SERVICE_NAME }}
      REPO: ${{ vars.GOOGLE_CLOUD_ARTIFACT_REPO }}
      POSTGRES_HOSTNAME: ${{ vars.POSTGRES_HOSTNAME }}
      POSTGRES_USER: ${{ vars.POSTGRES_USER }}
      POSTGRES_DB: ${{ vars.POSTGRES_DB }}
      ATLAS_BASELINE_VERSION: ${{ vars.ATLAS_BASELINE_VERSION }}
    steps:
      - uses: actions/checkout@v6.0.3

      - id: auth
        uses: google-github-actions/auth@v3.0.0
        with:
          project_id: ${{ env.PROJECT_ID }}
          workload_identity_provider: ${{ vars.GOOGLE_CLOUD_WIF_PROVIDER }}
          service_account: ${{ vars.GOOGLE_CLOUD_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v3.0.1
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --project="$PROJECT_ID" --quiet

      - uses: docker/setup-buildx-action@v4.1.0

      - name: Build and push image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: true
          tags: ${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPO }}/${{ env.SERVICE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install Atlas Community
        run: curl -sSf https://atlasgo.sh | sh -s -- --community

      - name: Apply database migrations
        run: |
          for name in POSTGRES_HOSTNAME POSTGRES_USER POSTGRES_DB; do
            if [ -z "${!name}" ]; then
              echo "$name repository variable is required" >&2
              exit 1
            fi
          done

          POSTGRES_PASSWORD="$(gcloud secrets versions access latest --secret=POSTGRES_PASSWORD --project="$PROJECT_ID")"
          echo "::add-mask::$POSTGRES_PASSWORD"
          POSTGRES_USER_ENCODED="$(jq -rn --arg value "$POSTGRES_USER" '$value|@uri')"
          POSTGRES_PASSWORD_ENCODED="$(jq -rn --arg value "$POSTGRES_PASSWORD" '$value|@uri')"
          POSTGRES_DB_ENCODED="$(jq -rn --arg value "$POSTGRES_DB" '$value|@uri')"

          baseline_args=()
          if [ -n "$ATLAS_BASELINE_VERSION" ]; then
            baseline_args=(--baseline "$ATLAS_BASELINE_VERSION")
          fi

          atlas migrate apply \
            --env production \
            --var "database_url=postgres://${POSTGRES_USER_ENCODED}:${POSTGRES_PASSWORD_ENCODED}@${POSTGRES_HOSTNAME}:5432/${POSTGRES_DB_ENCODED}?sslmode=require&search_path=public" \
            "${baseline_args[@]}"

      - name: Update Cloud Run service image
        run: |
          gcloud run services update "$SERVICE" \
            --project="$PROJECT_ID" \
            --region="$REGION" \
            --container=app \
            --image="${REGION}-docker.pkg.dev/${PROJECT_ID}/${REPO}/${SERVICE}:${{ github.sha }}"
