name: CI

on:
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    container: swift:6.3.2-noble
    steps:
      - uses: actions/checkout@v6.0.3
      - run: swift format lint -r -p -s .
  test:
    runs-on: ubuntu-latest
    env:
      APPLE_APP_ID: XXXXXXXX.com.apple.memo
      VALKEY_HOSTNAME: valkey
      POSTGRES_HOSTNAME: postgres
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password
      POSTGRES_DB: test_database
      EDDSA_PRIVATE_KEY: T8s3Xh9Aulyq0UqIkggCgDyyXQKzPgIWH0w4Cb1O3Yg=
      RELYING_PARTY_ORIGIN: http://localhost:8080
      RELYING_PARTY_ID: localhost
      RELYING_PARTY_NAME: Local Host Relying Party
      CLOUDFLARE_ACCOUNT_ID: test-account-id
      CLOUDFLARE_API_TOKEN: test-api-token
      OTP_SECRET_KEY: 14nGf8gj0cPsgfZaoKKGBlmKz7kpcfgvYIGt0WH8BvE=
      JWT_ISSUER: blindlog-api
      JWT_AUDIENCE: blindlog-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3
      - name: Start DB, Cache & OTel Collector (wait for health)
        run: docker compose up -d --wait postgres valkey otel-collector
      - name: Cache SwiftPM build artifacts
        uses: actions/cache@v6
        with:
          path: .build
          key: ${{ runner.os }}-swift-6.3.2-${{ hashFiles('Package.swift', 'Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-swift-6.3.2-
      - name: Run tests (Swift in Docker)
        run: docker compose run --rm swift bash -lc "apt-get update && apt-get install -y libssl-dev && swift test --parallel"
      - name: Shutdown
        run: docker compose down -v
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: docker/setup-buildx-action@v4.1.0
      - name: Build image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: hashicorp/setup-terraform@v4.0.1
        with:
          terraform_version: ~1.14
      - run: terraform -chdir=Terraform fmt -check -diff
      - run: terraform -chdir=Terraform init -backend=false
      - run: terraform -chdir=Terraform validate
