              schema:
                $ref: '#/components/schemas/APIError'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    APIError:
      type: object
      description: A machine-readable API error response.
      properties:
        error:
          type: string
          description: Stable snake_case error code for client-side branching.
        message:
          type:
            - string
            - 'null'
          description: Optional safe diagnostic message.
      required:
        - error
    UserToken:
      type: object
      description: A value with the User contents.
      properties:
        userID:
          type: string
          format: uuid
          description: User id.
        token:
          type: string
          description: User token.
        tokenExpiredDate:
          type: number
          format: double
          description: User token expired date.
        refreshToken:
          type: string
          description: User refresh token.
        refreshTokenExpiredDate:
          type: number
          format: double
          description: User refresh token expired date.
      required:
        - userID
        - token
        - tokenExpiredDate
        - refreshToken
        - refreshTokenExpiredDate
    User:
      type: object
      description: A value with the User contents.
      properties:
        id:
          type: string
          format: uuid
          description: User id.
        email:
          type: string
          format: email
          description: User email.
      required:
        - id
    UserProfile:
      type: object
      description: A value with the user profile contents.
      properties:
        userID:
          type: string
          format: uuid
          description: User id.
        name:
          type: string
          description: User profile name.
        imageURL:
          type:
            - string
            - 'null'
          format: uri
          description: Image URL for the profile image.
        createdAt:
          type: number
          format: double
          description: User profile created date.
      required:
        - userID
        - name
        - createdAt
    Me:
      type: object
      description: A value with the current user profile and registered email addresses.
      properties:
        userID:
          type: string
          format: uuid
          description: User id.
        userProfile:
          $ref: '#/components/schemas/MeUserProfile'
          description: Current user profile, or null when it is not created yet.
        emails:
          type: array
          description: Registered email addresses.
          items:
            $ref: '#/components/schemas/Email'
      required:
        - userID
        - userProfile
        - emails
    MeUserProfile:
      type:
        - object
        - 'null'
      description: A current user profile summary for the authenticated user.
      properties:
        name:
          type: string
          description: User profile name.
        imageURL:
          type:
            - string
            - 'null'
          format: uri
          description: Image URL for the profile image.
        createdAt:
          type: number
          format: double
          description: User profile created date.
      required:
        - name
        - createdAt
    Email:
      type: object
      description: A registered email address.
      properties:
        email:
          type: string
          format: email
          description: Registered email address.
        createdAt:
          type: number
          format: double
          description: Registered email created date.
      required:
        - email
        - createdAt
    CreateUserProfileRequest:
      type: object
      description: A request to create a user profile entry.
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
          description: User profile name.
        imageID:
          type: string
          format: uuid
          description: Image id for the profile image.
      required:
        - name
    CreateImageUploadURLResponse:
      type: object
      description: A response with a Cloudflare Images direct upload URL.
      properties:
        imageID:
          type: string
          description: Cloudflare Images image id.
        uploadURL:
          type: string
          description: Cloudflare Images direct upload URL.
      required:
        - imageID
        - uploadURL
    CreateImageRequest:
      type: object
      description: A request to register an uploaded image.
      properties:
        imageID:
          type: string
          description: Cloudflare Images image id.
      required:
        - imageID
    Image:
      type: object
      description: A value with the uploaded image contents.
      properties:
        id:
          type: string
          format: uuid
          description: Image id.
        imageID:
          type: string
          description: Cloudflare Images image id.
        createdAt:
          type: number
          format: double
          description: Image registered date.
      required:
        - id
        - imageID
        - createdAt
    Event:
      type: object
      description: A blind tasting event.
      properties:
        id:
          type: string
          format: uuid
        organizerUserID:
          type: string
          format: uuid
        title:
          type: string
        body:
          type: string
