openapi: '3.1.0'
info:
  title: Blindlog API server
  version: 1.0.0
servers:
  - url: https://api.blindlog.me
    description: Blindlog API server
tags:
  - name: System
    description: Health checks and platform integration documents.
  - name: Authentication
    description: User creation, passkey authentication, email OTP login, and token lifecycle endpoints.
  - name: Current User
    description: Authenticated user profile and email verification endpoints.
  - name: Users
    description: Public user and user-profile lookup endpoints.
  - name: Images
    description: Cloudflare Images direct upload and image registration endpoints.
  - name: Events
    description: Blind tasting event, participant, question, answer, and response endpoints.
  - name: Ratings
    description: Seasonal rating, ledger, and rating leaderboard endpoints.
  - name: Wine Master Data
    description: Read-only wine style, variety, and region reference data.
paths:
  /health:
    get:
      operationId: getHealth
      tags:
        - System
      summary: Check API health
      description: Returns a lightweight success response used by load balancers, uptime checks, and deployment smoke tests.
      responses:
        '200':
          description: A success response indicating the server is healthy.
  /.well-known/apple-app-site-association:
    get:
      operationId: getAppleAppSiteAssociation
      tags:
        - System
      summary: Get Apple app site association
      description: Returns the Apple App Site Association document used by iOS for passkeys, App Clips, and Universal Links.
      responses:
        '200':
          description: A success response with the Apple App Site Association document.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppleAppSiteAssociation'
  /challenge/registration:
    post:
      operationId: createRegistrationChallenge
      tags:
        - Authentication
      summary: Create passkey registration challenge
      description: |-
        Issues a Base64URL-encoded challenge for registering a new passkey.
        Requires a Bearer token and binds the challenge to the authenticated user.
        The challenge is single-use (consumed via getdel) and expires after 10 minutes.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A success response with a newly issued passkey registration challenge.
          content:
            application/json:
              schema:
                type: string
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /challenge/authentication:
    post:
      operationId: createAuthenticationChallenge
      tags:
        - Authentication
      summary: Create passkey authentication challenge
      description: |-
        Issues a Base64URL-encoded challenge for authenticating with an existing passkey.
        No authentication is required and the challenge is not bound to a user.
        The challenge is single-use (consumed via getdel) and expires after 10 minutes.
      responses:
        '200':
          description: A success response with a newly issued passkey authentication challenge.
          content:
            application/json:
              schema:
                type: string
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /passkey:
    post:
      operationId: addPasskey
      tags:
        - Authentication
      summary: Register passkey
      description: Registers a new passkey credential for the authenticated user using a challenge previously returned by the API.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddPasskey'
      responses:
        '200':
          description: A success response indicating the passkey was registered.
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /user:
    post:
      operationId: createUser
      tags:
        - Authentication
      summary: Create anonymous user
      description: Creates a user account and returns the initial access and refresh tokens for that user.
      responses:
        '200':
          description: A success response with a token for the created user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserToken'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /token/passkey:
    post:
      operationId: createTokenFromPasskey
      tags:
        - Authentication
      summary: Create token from passkey
      description: Authenticates a user with a passkey assertion and returns a fresh access token and refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePasskeyTokenRequest'
      responses:
        '200':
          description: A success response with a token created from passkey authentication.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserToken'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /token/email:
    post:
      operationId: createTokenFromEmail
      tags:
        - Authentication
      summary: Create token from email OTP
      description: Authenticates a user with an email one-time password challenge and returns a fresh access token and refresh token.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEmailTokenRequest'
      responses:
        '200':
          description: A success response with a token created from email OTP authentication.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserToken'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '404':
          description: Not found User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /token/email/start:
    post:
      operationId: sendEmailForToken
      tags:
        - Authentication
      summary: Start email OTP login
      description: Sends a one-time password to a registered email address and returns the challenge required to complete email login.
      parameters:
        - name: email
          in: query
          description: Registered email address that receives the one-time password for login.
          required: true
          schema:
            type: string
            format: email
      responses:
        '200':
          description: A success response with the email login OTP challenge.
          content:
            application/json:
              schema:
                type: string
                contentEncoding: base64
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '404':
          description: Not found User
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /refreshToken:
    post:
      operationId: refreshToken
      tags:
        - Authentication
      summary: Refresh user tokens
      description: Exchanges a valid refresh token for a new access token and refresh token pair.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: User refresh token.
              required:
                - refreshToken
      responses:
        '200':
          description: A success response with refreshed user tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserToken'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /revokeToken:
    post:
      operationId: revokeToken
      tags:
        - Authentication
      summary: Revoke refresh token
      description: Revokes a refresh token so it can no longer be used to issue new user tokens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: User refresh token.
              required:
                - refreshToken
      responses:
        '200':
          description: A success response.
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /me:
    get:
      operationId: getMe
      tags:
        - Current User
      summary: Get current user
      description: Returns the authenticated user ID, current profile summary, and registered email addresses.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A success response with the current user state.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Me'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
    post:
      operationId: createUserProfile
      tags:
        - Current User
      summary: Create current user profile
      description: Creates the authenticated user profile, including the display name and optional profile image.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserProfileRequest'
      responses:
        '200':
          description: A success response with the created user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /user_profile/{user_id}:
    get:
      operationId: getUserProfile
      tags:
        - Users
      summary: Get user profile
      description: Returns the latest profile for the requested user.
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target user ID in UUID format.
      responses:
        '200':
          description: A success response with the latest user profile.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '404':
          description: Not found User Profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /users/{user_id}/organized_events:
    get:
      operationId: getUserOrganizedEvents
      tags:
        - Users
      summary: List organized events
      description: Returns blind tasting events organized by the requested user.
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target user ID in UUID format.
      responses:
        '200':
          description: A success response with events organized by the user.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /users/{user_id}/participating_events:
    get:
      operationId: getUserParticipatingEvents
      tags:
        - Users
      summary: List participating events
      description: Returns blind tasting events where the requested user is registered as a participant.
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target user ID in UUID format.
      responses:
        '200':
          description: A success response with events the user participates in.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /images/upload_url:
    post:
      operationId: createImageUploadURL
      tags:
        - Images
      summary: Create image upload URL
      description: Creates a Cloudflare Images direct upload URL that clients can use before registering the uploaded image.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A success response with a direct image upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateImageUploadURLResponse'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /images:
    post:
      operationId: createImage
      tags:
        - Images
      summary: Register uploaded image
      description: Registers an image after the client has uploaded it to Cloudflare Images.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateImageRequest'
      responses:
        '200':
          description: A success response with the registered image.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Image'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /events:
    get:
      operationId: getEvents
      tags:
        - Events
      summary: List events
      description: Returns blind tasting events visible to the authenticated user.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: A success response with events.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Event'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
    post:
      operationId: createEvent
      tags:
        - Events
      summary: Create event
      description: Creates a blind tasting event with venue, schedule, visibility, and response deadlines.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '200':
          description: A success response with the created event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /events/{event_id}:
    get:
      operationId: getEvent
      tags:
        - Events
      summary: Get event
      description: Returns the latest revision of a blind tasting event.
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target event ID in UUID format.
      responses:
        '200':
          description: A success response with the event.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '404':
          description: Not found Event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
    put:
      operationId: updateEvent
      tags:
        - Events
      summary: Update event
      description: Updates event details and returns the latest event revision.
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target event ID in UUID format.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventRequest'
      responses:
        '200':
          description: A success response with the latest event revision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Event'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '404':
          description: Not found Event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /events/{event_id}/participants:
    get:
      operationId: getEventParticipants
      tags:
        - Events
      summary: List event participants
      description: Returns the participants of an event. Organizer only.
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target event ID in UUID format.
      responses:
        '200':
          description: A success response with the event participants.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventParticipant'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '404':
          description: Not found Event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
    post:
      operationId: registerEventParticipant
      tags:
        - Events
      summary: Register event participant
      description: Registers the authenticated user as a participant for the specified event.
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target event ID in UUID format.
      responses:
        '200':
          description: A success response with the event participant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventParticipant'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '404':
          description: Not found Event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /events/{event_id}/participants/me:
    put:
      operationId: updateMyEventParticipant
      tags:
        - Events
      summary: Update my participation status
      description: Updates the authenticated user's participation status, such as canceling a registration.
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target event ID in UUID format.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateEventParticipantRequest'
      responses:
        '200':
          description: A success response with the updated event participant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventParticipant'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '404':
          description: Not found Event Participant
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /events/{event_id}/questions:
    get:
      operationId: getEventQuestions
      tags:
        - Events
      summary: List event questions
      description: Returns the questions of a blind tasting event ordered by question number.
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target event ID in UUID format.
      responses:
        '200':
          description: A success response with the event questions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/EventQuestion'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '404':
          description: Not found Event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
    post:
      operationId: createEventQuestion
      tags:
        - Events
      summary: Create event question
      description: Creates a blind tasting question within an event.
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target event ID in UUID format.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventQuestionRequest'
      responses:
        '200':
          description: A success response with the created event question.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventQuestion'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '404':
          description: Not found Event
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /events/{event_id}/questions/{question_id}:
    put:
      operationId: updateEventQuestion
      tags:
        - Events
      summary: Update event question
      description: Updates a blind tasting question and returns its latest revision.
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target event ID in UUID format.
        - name: question_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target event question ID in UUID format.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEventQuestionRequest'
      responses:
        '200':
          description: A success response with the latest event question revision.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EventQuestion'
        '400':
          description: A bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
        '404':
          description: Not found Event Question
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/APIError'
  /events/{event_id}/questions/{question_id}/correct_answer:
    get:
      operationId: getEventQuestionCorrectAnswer
      tags:
        - Events
      summary: Get correct answer
      description: Returns the official correct answer for a blind tasting question. Organizers can always access it; participants only after answers are published.
      security:
        - bearerAuth: []
      parameters:
        - name: event_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Target event ID in UUID format.
        - name: question_id
          in: path
          required: true
